<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 100" width="520" height="100">
  <!-- Horizontal logo: VKTR LABS on one line, tagline below, sand/beige on transparent -->

  <!-- VKTR text -->
  <text x="10" y="52" text-anchor="start"
        font-family="Cormorant Garamond, Georgia, Times New Roman, serif"
        font-size="52" font-weight="600" letter-spacing="0.12em"
        fill="#c4b5a0">VKTR</text>

  <!-- Vertical separator -->
  <line x1="195" y1="18" x2="195" y2="58" stroke="#c4b5a0" stroke-width="0.8"/>

  <!-- LABS text -->
  <text x="210" y="48" text-anchor="start"
        font-family="Cormorant Garamond, Georgia, Times New Roman, serif"
        font-size="28" font-weight="400" letter-spacing="0.35em"
        fill="#c4b5a0">LABS</text>

  <!-- Tagline -->
  <text x="10" y="82" text-anchor="start"
        font-family="Inter, Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="9.5" font-weight="300" letter-spacing="0.25em"
        fill="#c4b5a0">ELEVATE THROUGH EVIDENCE</text>
</svg>