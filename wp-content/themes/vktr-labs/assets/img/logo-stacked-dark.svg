<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 220" width="360" height="220">
  <!-- Stacked logo: VKTR on top, LABS with lines, tagline at bottom, charcoal on transparent -->

  <!-- VKTR main text -->
  <text x="180" y="80" text-anchor="middle"
        font-family="Cormorant Garamond, Georgia, Times New Roman, serif"
        font-size="78" font-weight="600" letter-spacing="0.14em"
        fill="#2c2c2c">VKTR</text>

  <!-- Horizontal rules flanking LABS -->
  <line x1="60" y1="112" x2="125" y2="112" stroke="#2c2c2c" stroke-width="0.8"/>
  <line x1="235" y1="112" x2="300" y2="112" stroke="#2c2c2c" stroke-width="0.8"/>

  <!-- LABS text -->
  <text x="180" y="118" text-anchor="middle"
        font-family="Cormorant Garamond, Georgia, Times New Roman, serif"
        font-size="26" font-weight="400" letter-spacing="0.4em"
        fill="#2c2c2c">LABS</text>

  <!-- Thin divider line -->
  <line x1="130" y1="145" x2="230" y2="145" stroke="#2c2c2c" stroke-width="0.5"/>

  <!-- Tagline -->
  <text x="180" y="170" text-anchor="middle"
        font-family="Inter, Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="10" font-weight="300" letter-spacing="0.25em"
        fill="#2c2c2c">ELEVATE THROUGH</text>
  <text x="180" y="186" text-anchor="middle"
        font-family="Inter, Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="10" font-weight="300" letter-spacing="0.25em"
        fill="#2c2c2c">EVIDENCE</text>
</svg>